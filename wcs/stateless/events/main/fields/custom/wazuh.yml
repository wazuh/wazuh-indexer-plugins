---
- name: wazuh
  title: Wazuh
  description: >
    Wazuh Inc. custom fields
  fields:
    - name: event.id
      type: keyword
      level: custom
      description: >
        Unique identifier shared across all related events, generated by Wazuh.
      example: "1234567890abcdef" 
    - name: integration.name
      type: keyword
      level: custom
      description: >
        Name of the Wazuh integration.
      example: "Cisco Aironet"
    - name: integration.decoders
      type: keyword
      description: >
        List of Wazuh decoders applied to the event.
      normalize:
        - array
      level: custom
      example: '["json", "syslog"]'
    - name: integration.rules
      type: keyword
      level: custom
      description: >
        List of Wazuh rules applied to the event.
      normalize:
        - array
      example: '["1002", "2003"]'
    - name: integration.category
      type: keyword
      level: custom
      description: >
        Wazuh integration category.
      example: "security"
    - name: cluster.name
      type: keyword
      level: custom
      description: >
        Wazuh cluster name.
      example: "wazuh-cluster-1"
    - name: cluster.node
      type: keyword
      level: custom
      description: >
        Wazuh cluster node name.
      example: "wazuh-cluster-node-1"
    - name: space.name
      type: keyword
      level: custom
      description: >
        Wazuh space name.
      example: "default"
    - name: space.event_discarded
      type: boolean
      level: custom
      short: When `true`, the event would have been discarded.
      description: >
        Indicates whether the event would have been discarded by the Wazuh Engine during the filtering phase when the active policy has `index_discarded_events` set to `true`. 
      example: false
    - name: protocol.location
      type: keyword
      level: custom
      description: >
        Source of the log as retrieved by the Wazuh Agent.
      example: "/var/log/auth.log"
    - name: protocol.queue
      type: byte
      level: custom
      description: >
        Ingestion queue for the log.
      example: 1
    - name: schema.version
      type: keyword
      level: custom
      description: >
        Wazuh schema version.
      example: "1.7.0"
    - name: case.title
      type: match_only_text
      level: custom
      description: >
        Title summarizing the case.
      example: "Sample Case Title"
    - name: case.description
      type: match_only_text
      level: custom
      description: >
        Detailed description of the case.
      example: "This is a sample description for the case."
    - name: case.user.name
      type: keyword
      level: custom
      description: >
        Name of the user that owns the case. Not editable by the user.
      example: "admin"
    - name: case.status
      type: keyword
      level: custom
      description: >
        Current status of the case. One of ACTIVE, ACKNOWLEDGED, COMPLETED, ERROR, DELETED, AUDIT.
      example: "ACTIVE"
    - name: case.severity
      type: keyword
      level: custom
      description: >
        Severity of the case. One of INFORMATIONAL, LOW, MEDIUM, HIGH, CRITICAL.
      example: "MEDIUM"
    - name: case.priority
      type: keyword
      level: custom
      description: >
        Priority of the case. One of LOW, MEDIUM, HIGH, URGENT.
      example: "MEDIUM"
    - name: case.tlp
      type: keyword
      level: custom
      description: >
        Traffic Light Protocol classification of the case. One of TLP:RED, TLP:AMBER, TLP:GREEN, TLP:CLEAR.
      example: "TLP:CLEAR"
    - name: case.created_at
      type: date
      level: custom
      description: >
        Timestamp when the case was created.
      example: "1623456789000"
    - name: case.updated_at
      type: date
      level: custom
      description: >
        Timestamp when the case was last updated.
      example: "1623456789000"
    - name: case.tags
      type: keyword
      level: custom
      description: >
        Tags attached to the case for organization.
      normalize:
        - array
      example: '["tag1", "tag2", "tag3"]'
    - name: case.comments
      type: nested
      level: custom
      description: >
        Array of comments attached to the case, each authored and timestamped independently.
      normalize:
        - array
    - name: case.comments.author
      type: keyword
      level: custom
      description: >
        Name of the user that authored the comment.
      example: "admin"
    - name: case.comments.created_at
      type: date
      level: custom
      description: >
        Timestamp when the comment was created.
      example: "1623456789000"
    - name: case.comments.updated_at
      type: date
      level: custom
      description: >
        Timestamp when the comment was last updated.
      example: "1623456789000"
    - name: case.comments.comment
      type: match_only_text
      level: custom
      description: >
        Text content of the comment.
      example: "This is a comment for the case."
