---
- name: wazuh
  title: Wazuh
  description: >
    Wazuh Inc. custom fields
  fields:
    - name: cluster.name
      type: keyword
      level: custom
      description: >
        Wazuh cluster name.
      example: "wazuh-cluster"
    - name: cluster.node
      type: keyword
      level: custom
      description: >
        Wazuh cluster node name.
      example: "wazuh-node-1"
    - name: space.name
      type: keyword
      level: custom
      description: >
        Wazuh space name. Null for global metrics, a string for space-scoped metrics.
      example: "standard"
    - name: schema.version
      type: keyword
      level: custom
      description: >
        Wazuh schema version.
      example: "1"
