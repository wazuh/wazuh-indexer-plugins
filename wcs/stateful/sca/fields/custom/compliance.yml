---
- name: compliance
  title: Compliance
  description: >
    Fields related to compliance frameworks and their specific requirements.
  type: group
  reusable:
    top_level: true
    expected:
      - check
  fields:
    - name: gdpr
      type: keyword
      level: custom
      description: GDPR requirements.
      normalize:
        - array
      example: '["Art. 32", "Art. 25"]'
    - name: pci_dss
      type: keyword
      level: custom
      description: PCI DSS requirements.
      normalize:
        - array
      example: '["2.2.1", "6.3.3"]'
    - name: cmmc
      type: keyword
      level: custom
      description: CMMC requirements.
      normalize:
        - array
      example: '["AC.1.001", "AU.L2-3.3.1"]'
    - name: nist_800_53
      type: keyword
      level: custom
      description: NIST 800-53 requirements.
      normalize:
        - array
      example: '["AC-3", "AU-2"]'
    - name: nist_800_171
      type: keyword
      level: custom
      description: NIST 800-171 requirements.
      normalize:
        - array
      example: '["3.1.1", "3.3.1"]'
    - name: hipaa
      type: keyword
      level: custom
      description: HIPAA requirements.
      normalize:
        - array
      example: '["164.312(a)(1)", "164.308(a)(5)(ii)(C)"]'
    - name: iso_27001
      type: keyword
      level: custom
      description: ISO 27001 requirements.
      normalize:
        - array
      example: '["A.9.4.1", "A.8.8"]'
    - name: nis2
      type: keyword
      level: custom
      description: NIS2 requirements.
      normalize:
        - array
      example: '["Art. 21", "Art. 23"]'
    - name: tsc
      type: keyword
      level: custom
      description: TSC requirements.
      normalize:
        - array
      example: '["CC6.1", "CC7.1"]'
    - name: fedramp
      type: keyword
      level: custom
      description: FedRAMP requirements.
      normalize:
        - array
      example: '["AC-2", "SC-7"]'

- name: mitre
  title: MITRE ATT&CK
  description: >
    Fields related to the MITRE ATT&CK framework.
  type: group
  reusable:
    top_level: true
    expected:
      - check
  fields:
    - name: tactic
      type: object
      level: custom
      description: MITRE ATT&CK tactics.
    - name: tactic.id
      type: keyword
      level: custom
      description: MITRE ATT&CK tactic identifiers.
      normalize:
        - array
      example: '["TA0002", "TA0005"]'
    - name: tactic.name
      type: keyword
      level: custom
      description: MITRE ATT&CK tactic names.
      normalize:
        - array
      example: '["Execution", "Defense Evasion"]'
    - name: technique
      type: object
      level: custom
      description: MITRE ATT&CK techniques.
    - name: technique.id
      type: keyword
      level: custom
      description: MITRE ATT&CK technique identifiers.
      normalize:
        - array
      example: '["T1059", "T1562"]'
    - name: technique.name
      type: keyword
      level: custom
      description: MITRE ATT&CK technique names.
      normalize:
        - array
      example: '["Command and Scripting Interpreter", "Impair Defenses"]'
    - name: subtechnique
      type: object
      level: custom
      description: MITRE ATT&CK subtechniques.
    - name: subtechnique.id
      type: keyword
      level: custom
      description: MITRE ATT&CK subtechnique identifiers.
      normalize:
        - array
      example: '["T1059.001", "T1078.001"]'
    - name: subtechnique.name
      type: keyword
      level: custom
      description: MITRE ATT&CK subtechnique names.
      normalize:
        - array
      example: '["Command and Scripting Interpreter: PowerShell", "Valid Accounts: Default Accounts"]'
