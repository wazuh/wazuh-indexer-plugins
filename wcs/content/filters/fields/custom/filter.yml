---
- name: filter
  root: true
  title: Filter
  group: 1
  description: >
      Engine filters document custom fields
  type: group
  fields:
    - name: hash.sha256
      level: custom
      type: keyword
      example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
      description: "The SHA-256 hash of the filter document."
    - name: space.name
      level: custom
      type: keyword
      example: "draft"
      description: "The name of the space where the filter is defined."
    - name: document.name
      type: keyword
      level: custom
      description: >
          Human-readable name of the filter.
      example: "Block suspicious login"
    - name: document.enabled
      type: boolean
      level: custom
      description: >
          Whether the filter is enabled.
      example: true
    - name: document.metadata.title
      type: keyword
      level: custom
      description: >
          Title of the filter.
      example: "Suspicious Login Filter"
    - name: document.metadata.description
      type: text
      level: custom
      description: >
          Description of the filter purpose or behavior.
      example: "Detects failed logins from new locations."
    - name: document.metadata.author
      type: keyword
      level: custom
      description: >
          Author of the filter.
      example: "Wazuh, Inc."
    - name: document.metadata.date
      type: date
      level: custom
      description: >
          Creation date of the filter.
      example: "2024-01-15T08:30:00.000Z"
    - name: document.metadata.modified
      type: date
      level: custom
      description: >
          Last modification date of the filter.
      example: "2024-02-20T14:45:00.000Z"
    - name: document.metadata.references
      type: keyword
      level: custom
      description: >
          References or links related to the filter.
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/filters.html"
    - name: document.metadata.documentation
      type: keyword
      level: custom
      description: >
          Documentation link for the filter.
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/filters.html"
    - name: document.metadata.supports
      type: keyword
      level: custom
      description: >
          Supported platforms or components for the filter.
      example: "linux"
    - name: document.check
      type: object
      enabled: false
      level: custom
      description: >
          Check expression or identifier used by the filter.
      example: "event.action:login AND event.outcome:failure"
    - name: document.type
      type: keyword
      level: custom
      description: >
          Filter type or category.
      example: "event"
    - name: document.id
      type: keyword
      level: custom
      description: >
          Unique identifier of the filter document.
      example: "filter-12345"
    - name: yaml
      type: text
      level: custom
      description: >
          The YAML representation of the filter configuration.
