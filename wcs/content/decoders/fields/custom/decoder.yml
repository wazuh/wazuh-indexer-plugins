---
- name: decoder
  root: true
  title: Decoder
  group: 1
  description: >
    Wazuh Threat Intel decoders document custom fields
  type: group
  fields:
    - name: document.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Human-readable name of the decoder."
      example: "syslog-decoder"
    - name: document.enabled
      level: custom
      type: boolean
      description: "Whether the decoder is enabled."
      example: true
    - name: document.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Unique identifier of the decoder document."
      example: "decoder-12345"
    - name: document.metadata.title
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Title of the decoder."
      example: "Syslog Decoder"
    - name: document.metadata.author
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Author of the decoder."
      example: "Wazuh, Inc."
    - name: document.metadata.date
      level: custom
      type: date
      description: "Creation date of the decoder."
      example: "2024-01-15T08:30:00.000Z"
    - name: document.metadata.modified
      level: custom
      type: date
      description: "Last modification date of the decoder."
      example: "2024-02-20T14:45:00.000Z"
    - name: document.metadata.description
      level: custom
      type: text
      description: "Human-readable description of the decoder."
      example: "Parses standard syslog messages."
    - name: document.metadata.references
      level: custom
      type: keyword
      ignore_above: 1024
      description: "References or links related to the decoder."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/decoders.html"
    - name: document.metadata.documentation
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Documentation link for the decoder."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/decoders.html"
    - name: document.metadata.supports
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Supported platforms or operating systems."
      example: "linux"
    - name: document.metadata.module
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Module that this decoder belongs to."
      example: "wazuh-core"
    - name: document.metadata.compatibility
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Compatibility information for the decoder."
      example: "wazuh >= 4.0"
    - name: document.metadata.versions
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Supported versions for this decoder."
      example: "4.0, 4.1"
    - name: document.definitions
      level: custom
      type: object
      enabled: false
      description: "Internal decoder definitions (stored but not indexed)."
    - name: document.check
      level: custom
      type: object
      enabled: false
      description: "Check conditions for the decoder (stored but not indexed)."
    - name: document.parents
      level: custom
      type: keyword
      ignore_above: 1024
      description: "List of parent decoder names."
      example: "wazuh-core-decoder"
    - name: document.normalize
      level: custom
      type: object
      enabled: false
      description: "Normalization rules for the decoder (stored but not indexed)."
    - name: hash.sha256
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The SHA-256 hash of the decoder document."
      example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    - name: offset
      level: custom
      type: unsigned_long
      description: "The CTI offset value at which this document was last synchronized."
      example: 1000
    - name: yaml
      level: custom
      type: text
      description: "The YAML representation of the decoder configuration."
    - name: space.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The name of the space where the decoder is defined."
      example: "default"

