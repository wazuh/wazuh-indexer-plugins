---
- name: integration
  root: true
  title: Integration
  group: 1
  description: >
    Wazuh Threat Intel integrations document custom fields
  type: group
  fields:
    - name: document.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Unique identifier of the integration document."
      example: "integration-12345"
    - name: document.default_parent
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Name of the default parent integration."
      example: "wazuh-core"
    - name: document.category
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Category of the integration (e.g., network-activity, system-activity)."
      example: "system-activity"
    - name: document.metadata.title
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Title of the integration."
      example: "Linux System Integration"
    - name: document.metadata.author
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Author of the integration."
      example: "Wazuh, Inc."
    - name: document.metadata.date
      level: custom
      type: date
      description: "Creation date of the integration."
      example: "2024-01-15T08:30:00.000Z"
    - name: document.metadata.modified
      level: custom
      type: date
      description: "Last modification date of the integration."
      example: "2024-02-20T14:45:00.000Z"
    - name: document.metadata.description
      level: custom
      type: text
      description: "Human-readable description of the integration."
      example: "Collects and processes Linux system events."
    - name: document.metadata.references
      level: custom
      type: keyword
      ignore_above: 1024
      description: "References or links related to the integration."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/integrations.html"
    - name: document.metadata.documentation
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Documentation link for the integration."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/integrations.html"
    - name: document.metadata.supports
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Supported platforms or operating systems."
      example: "linux"
    - name: document.enabled
      level: custom
      type: boolean
      description: "Whether the integration is enabled."
      example: true
    - name: document.decoders
      level: custom
      type: keyword
      ignore_above: 1024
      description: "List of decoder names included in this integration."
      example: "syslog-decoder"
    - name: document.kvdbs
      level: custom
      type: keyword
      ignore_above: 1024
      description: "List of key-value database names included in this integration."
      example: "geoip-kvdb"
    - name: document.rules
      level: custom
      type: keyword
      ignore_above: 1024
      description: "List of rule names included in this integration."
      example: "linux-auth-rules"
    - name: hash.sha256
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The SHA-256 hash of the integration document."
      example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    - name: offset
      level: custom
      type: unsigned_long
      description: "The CTI offset value at which this document was last synchronized."
      example: 1000
    - name: space.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The name of the space where the integration is defined."
      example: "default"

