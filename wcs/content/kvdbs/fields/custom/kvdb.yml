---
- name: kvdb
  root: true
  title: KVDB
  group: 1
  description: >
    Wazuh Threat Intel key-value databases document custom fields
  type: group
  fields:
    - name: document.id
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Unique identifier of the KVDB document."
      example: "kvdb-12345"
    - name: document.metadata.title
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Title of the KVDB."
      example: "GeoIP Database"
    - name: document.metadata.author
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Author of the KVDB."
      example: "Wazuh, Inc."
    - name: document.metadata.date
      level: custom
      type: date
      description: "Creation date of the KVDB."
      example: "2024-01-15T08:30:00.000Z"
    - name: document.metadata.modified
      level: custom
      type: date
      description: "Last modification date of the KVDB."
      example: "2024-02-20T14:45:00.000Z"
    - name: document.metadata.description
      level: custom
      type: text
      description: "Human-readable description of the KVDB."
      example: "Maps IP addresses to geographic locations."
    - name: document.metadata.references
      level: custom
      type: keyword
      ignore_above: 1024
      description: "References or links related to the KVDB."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/kvdbs.html"
    - name: document.metadata.documentation
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Documentation link for the KVDB."
      example: "https://documentation.wazuh.com/current/user-manual/ruleset/kvdbs.html"
    - name: document.metadata.supports
      level: custom
      type: keyword
      ignore_above: 1024
      description: "Supported platforms or operating systems."
      example: "linux"
    - name: document.enabled
      level: custom
      type: boolean
      description: "Whether the KVDB is enabled."
      example: true
    - name: document.content
      level: custom
      type: object
      enabled: false
      description: "KVDB content data (stored but not indexed)."
    - name: hash.sha256
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The SHA-256 hash of the KVDB document."
      example: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    - name: offset
      level: custom
      type: unsigned_long
      description: "The CTI offset value at which this document was last synchronized."
      example: 1000
    - name: yaml
      level: custom
      type: text
      description: "The YAML representation of the KVDB configuration."
    - name: space.name
      level: custom
      type: keyword
      ignore_above: 1024
      description: "The name of the space where the KVDB is defined."
      example: "default"

