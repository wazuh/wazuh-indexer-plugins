- name: descriptions
  title: Descriptions
  description: Text in a particular language with optional alternate markup or formatted representation or embedded media.
  reusable:
    top_level: false
    expected:
      - { at: document.containers.cna, as: descriptions }
      - { at: document.containers.adp, as: descriptions }
      - { at: impacts, as: descriptions }
      - { at: document.containers.cna, as: configurations }
      - { at: document.containers.cna, as: workarounds }
      - { at: document.containers.cna, as: solutions }
      - { at: document.containers.cna, as: exploits }
      - { at: document.containers.cna, as: rejectedReasons }
      - { at: document.containers.adp, as: configurations }
      - { at: document.containers.adp, as: workarounds }
      - { at: document.containers.adp, as: solutions }
      - { at: document.containers.adp, as: exploits }
  fields:
    - name: lang
      type: keyword
      level: custom
      description: BCP 47 language code, language-region.
      example: en-US
    - name: value
      type: keyword
      level: custom
      description: Plain text description.
      example: This is a description of the vulnerability.
    - name: supportingMedia
      type: keyword
      level: custom
      description: Supporting media data for the description such as markdown, diagrams, etc.
      normalize:
        - array
