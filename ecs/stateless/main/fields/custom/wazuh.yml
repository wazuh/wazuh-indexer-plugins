---
- name: wazuh
  title: Wazuh
  description: >
    Wazuh Inc. custom fields
  fields:
    - name: integration.name
      type: keyword
      level: custom
      description: >
        Name of the Wazuh integration.
      example: "Cisco Aironet"
    - name: integration.decoders
      type: keyword
      description: >
        List of Wazuh decoders applied to the event.
      normalize:
        - array
      level: custom
      example: '["json", "syslog"]'
    - name: integration.rules
      type: keyword
      level: custom
      description: >
        List of Wazuh rules applied to the event.
      normalize:
        - array
      example: '["1002", "2003"]'
    - name: integration.category
      type: keyword
      level: custom
      description: >
        Wazuh integration category.
      example: "security"
    - name: cluster.name
      type: keyword
      level: custom
      description: >
        Wazuh cluster name.
      example: "wazuh-cluster-1"
    - name: cluster.node
      type: keyword
      level: custom
      description: >
        Wazuh cluster node name.
      example: "wazuh-cluster-node-1"
    - name: space.name
      type: keyword
      level: custom
      description: >
        Wazuh space name.
      example: "default"
    - name: space.event_discarded
      type: boolean
      level: custom
      short: When `true`, the event would have been discarded.
      description: >
        Indicates whether the event would have been discarded by the Wazuh Engine during the filtering phase when the active policy has `index_discarded_events` set to `true`. 
      example: false
    - name: protocol.location
      type: keyword
      level: custom
      description: >
        Source of the log as retrieved by the Wazuh Agent.
      example: "/var/log/auth.log"
    - name: protocol.queue
      type: byte
      level: custom
      description: >
        Ingestion queue for the log.
      example: 1
    - name: schema.version
      type: keyword
      level: custom
      description: >
        Wazuh schema version.
      example: "1.7.0"
    # Active Response 5.0 (active-responses index)
    - name: active_response.name
      type: keyword
      level: custom
      description: >
        Name of the active response.
      example: "firewall-drop"
    - name: active_response.executable_name
      type: keyword
      level: custom
      description: >
        Name of the executable or script to run.
      example: "firewall-drop"
    - name: active_response.extra_arguments
      type: keyword
      level: custom
      description: >
        List of extra arguments for the executable.
      normalize:
        - array
      example: '["192.168.1.100", "600"]'
    - name: active_response.location
      type: keyword
      level: custom
      description: >
        Execution location (agent or server).
      example: "agent"
    - name: active_response.agent_id
      type: keyword
      level: custom
      description: >
        Target agent ID for the active response execution.
      example: "001"
    - name: active_response.timeout
      type: integer
      level: custom
      description: >
        Maximum execution time in seconds.
      example: 300
    - name: event_reference.document_id
      type: keyword
      level: custom
      description: >
        Document ID of the matched alert that triggered the active response.
      example: "abc123"
    - name: event_reference.source_index
      type: keyword
      level: custom
      description: >
        Source index of the matched alert.
      example: "wazuh-events-v5-security"
