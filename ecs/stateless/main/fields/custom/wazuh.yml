---
- name: wazuh
  title: Wazuh
  description: >
    Wazuh Inc. custom fields
  fields:
    - name: integration.name
      type: keyword
      level: custom
      description: >
        Name of the Wazuh integration.
      example: "Cisco Aironet"
    - name: integration.decoders
      type: keyword
      description: >
        List of Wazuh decoders applied to the event.
      normalize:
        - array
      level: custom
      example: '["json", "syslog"]'
    - name: integration.rules
      type: keyword
      level: custom
      description: >
        List of Wazuh rules applied to the event.
      normalize:
        - array
      example: '["1002", "2003"]'
    - name: integration.category
      type: keyword
      level: custom
      description: >
        Wazuh integration category.
      example: "security"
    - name: cluster.name
      type: keyword
      level: custom
      description: >
        Wazuh cluster name.
      example: "wazuh-cluster-1"
    - name: cluster.node
      type: keyword
      level: custom
      description: >
        Wazuh cluster node name.
      example: "wazuh-cluster-node-1"
    - name: space.name
      type: keyword
      level: custom
      description: >
        Wazuh space name.
      example: "default"
    - name: space.event_discarded
      type: boolean
      level: custom
      short: When `true`, the event would have been discarded.
      description: >
        Indicates whether the event would have been discarded by the Wazuh Engine during the filtering phase when the active policy has `index_discarded_events` set to `true`. 
      example: false
    - name: protocol.location
      type: keyword
      level: custom
      description: >
        Source of the log as retrieved by the Wazuh Agent.
      example: "/var/log/auth.log"
    - name: protocol.queue
      type: byte
      level: custom
      description: >
        Ingestion queue for the log.
      example: 1
    - name: schema.version
      type: keyword
      level: custom
      description: >
        Wazuh schema version.
      example: "1.7.0"
    # Active Response 5.0 (active-responses index)
    - name: active_response.name
      type: keyword
      level: custom
      description: >
        Name of the active response configured in the channel.
      example: "firewall-drop"
    - name: active_response.executable
      type: keyword
      level: custom
      description: >
        Executable configured in the active response channel.
      example: "firewall-drop"
    - name: active_response.extra_arguments
      type: keyword
      level: custom
      description: >
        Arguments configured in the active response channel.
      normalize:
        - array
      example: '["192.168.1.100", "600"]'
    - name: active_response.location
      type: keyword
      level: custom
      description: >
        Where to execute. One of: local, defined-agent, all.
      example: "defined-agent"
    - name: active_response.agent_id
      type: keyword
      level: custom
      description: >
        Agent configured in the active response channel.
      example: "001"
    - name: active_response.type
      type: keyword
      level: custom
      description: >
        Response type. One of: stateless, stateful.
      example: "stateless"
    - name: active_response.stateful_timeout
      type: integer
      level: custom
      description: >
        Seconds configured in the channel (for stateful type).
      example: 300
