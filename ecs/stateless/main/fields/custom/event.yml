---
- name: event
  title: Context information about the log or metric event itself
  short: Context information about the log or metric event itself
  type: group
  group: 2
  fields:
    - name: changed_fields
      type: keyword
      level: custom
      description: >
        Fields that were updated since last scan.
      normalize:
        - array
      example: "[\"foo\", \"bar\"]"
    - name: collector
      type: keyword
      level: custom
      description: >
        Collector used to retrieve the event.
      example: file
    - name: doc_id
      type: keyword
      level: custom
      description: >
        Document ID of the matched alert that triggered the active response.
      example: "abc123"
    - name: index
      type: keyword
      level: custom
      description: >
        Source index of the matched alert that triggered the active response.
      example: "wazuh-events-v5-security"
