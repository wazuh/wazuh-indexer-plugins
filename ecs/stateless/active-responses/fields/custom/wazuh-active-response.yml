---
- name: wazuh
  title: Wazuh Active Response
  description: >
    Active Response 5.0 fields. Event reference and execution parameters.
  fields:
    - name: active_response.name
      type: keyword
      level: custom
      description: >
        Name of the active response.
      example: "firewall-drop"
    - name: active_response.executable_name
      type: keyword
      level: custom
      description: >
        Name of the executable or script to run.
      example: "firewall-drop"
    - name: active_response.extra_arguments
      type: keyword
      level: custom
      description: >
        List of extra arguments for the executable.
      normalize:
        - array
      example: '["192.168.1.100", "600"]'
    - name: active_response.location
      type: keyword
      level: custom
      description: >
        Execution location (agent or server).
      example: "agent"
    - name: active_response.agent_id
      type: keyword
      level: custom
      description: >
        Target agent ID for the active response execution.
      example: "001"
    - name: active_response.timeout
      type: integer
      level: custom
      description: >
        Maximum execution time in seconds.
      example: 300
    - name: event_reference.document_id
      type: keyword
      level: custom
      description: >
        Document ID of the matched alert that triggered the active response.
      example: "abc123"
    - name: event_reference.source_index
      type: keyword
      level: custom
      description: >
        Source index of the matched alert.
      example: "wazuh-events-v5-security"
