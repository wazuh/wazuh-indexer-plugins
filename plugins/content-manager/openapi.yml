openapi: 3.0.0
info:
  title: Indexer Content Manager API
  description: |
    API for content management and subscription handling for the Wazuh Indexer Content Manager.
    This API enables Cyber Threat Intelligence (CTI) subscription registration, credential management,
    and on-demand content updates for threat intelligence feeds.
  version: 1.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: "{protocol}://{wazuh.indexer}:{port}/_plugins/content-manager"
    description: Wazuh Indexer Content Manager Plugin
    variables:
      protocol:
        enum:
          - "http"
          - "https"
        default: "https"
      wazuh.indexer:
        default: localhost
      port:
        default: "9200"

tags:
  - name: Subscription Management
    description: Operations for managing CTI subscriptions and credentials
  - name: Content Updates
    description: Operations for triggering content updates
  - name: KVDBs
    description: Manage key-value databases used by content
  - name: Decoders
    description: Manage decoders for parsing and normalization
  - name: Filters
    description: Manage filters for event pre-processing and post-processing
  - name: Rules
    description: Manage detection rules and analytics
  - name: Integrations
    description: Manage integration metadata and related content
  - name: Logtest
    description: Execute logtest against sample events
  - name: Promotion
    description: Preview and promote content across spaces
  - name: Spaces
    description: Manage user spaces and environments

security:
  - bearerAuth: []
  - basicAuth: []

paths:
  /subscription:
    description: CTI registration & CTI credentials retrieval
    post:
      summary: Register CTI Subscription
      description: |
        Register a new Cyber Threat Intelligence subscription using device code authentication flow.
        This endpoint initiates the subscription process and must be called with valid device code
        credentials obtained from the CTI provider. The registration process is asynchronous and
        may take several seconds to complete.
      operationId: registerSubscription
      tags:
        - Subscription Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPostRequest"
            examples:
              registration:
                summary: Example subscription registration
                value:
                  device_code: "GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS"
                  client_id: "a17c21ed"
                  expires_in: 1800
                  interval: 5
      responses:
        "201":
          $ref: "#/components/responses/SubscriptionCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      summary: Retrieve CTI Credentials
      description: |
        Retrieve the access token and credentials for an active CTI subscription.
        The access token should be used as a Bearer token for subsequent API calls to CTI services.
      operationId: getCredentials
      tags:
        - Subscription Management
      responses:
        "200":
          $ref: "#/components/responses/GetCredentialsSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      summary: Delete CTI Subscription
      description: |
        Delete an existing CTI subscription and revoke all associated credentials.
        This operation is irreversible and will immediately terminate access to threat intelligence feeds.
      operationId: deleteSubscription
      tags:
        - Subscription Management
      responses:
        "200":
          $ref: "#/components/responses/SubscriptionDeleted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /update:
    description: On demand content update
    post:
      summary: Initiate On-Demand Content Update
      description: |
        Trigger an immediate update of threat intelligence content from subscribed CTI feeds.
        This operation is asynchronous and returns immediately with a task identifier.
        The update process runs in the background and may take several minutes to complete
        depending on the volume of new threat intelligence data.

        **Rate Limiting**: This endpoint is rate-limited to prevent excessive API calls.
        The default limit is 10 requests per hour.
      operationId: updateContent
      tags:
        - Content Updates
      responses:
        "202":
          $ref: "#/components/responses/UpdateAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # KVDB management endpoints
  /kvdbs:
    post:
      tags: [KVDBs]
      summary: Create KVDB
      description: |
        Creates a KVDB in the draft space. The server generates the UUID.
      operationId: createKvdb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KvdbResource"
            examples:
              create_kvdb:
                summary: Example KVDB creation
                value:
                  integration: "9e301671-382d-4c1a-9abf-3d9d9544789c"
                  resource:
                    title: "azure-functions"
                    author: "Wazuh Inc."
                    description: "This integration supports Azure Functions app logs."
                    documentation: "test1234"
                    references:
                      - "https://wazuh.com"
                    enabled: true
                    content:
                      key1: "value1"
                      key2: "value2"
      responses:
        "201":
          $ref: "#/components/responses/ResourceCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /kvdbs/{id}:
    put:
      tags: [KVDBs]
      summary: Update KVDB
      operationId: updateKvdb
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KvdbResourceUpdate"
            examples:
              update_kvdb:
                summary: Example KVDB update
                value:
                  resource:
                    title: "azure-functions (Updated)"
                    author: "Wazuh Inc."
                    description: "Updated description for Azure Functions KVDB."
                    documentation: "updated documentation"
                    references:
                      - "https://wazuh.com"
                      - "https://azure.microsoft.com"
                    enabled: false
                    content:
                      key1: "new_value1"
                      key3: "value3"
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [KVDBs]
      summary: Delete KVDB
      operationId: deleteKvdb
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/ResourceDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Decoder management endpoints
  /decoders:
    post:
      tags: [Decoders]
      summary: Create Decoder
      description: |
        Creates a decoder in the draft space. The server generates the UUID for the decoder.
        The decoder is validated against the Wazuh engine before being stored.
        The decoder is automatically linked to the specified integration.
      operationId: createDecoder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - integration
                - resource
              properties:
                integration:
                  type: string
                  format: uuid
                  description: The integration ID to which this decoder belongs
                  example: "9e301671-382d-4c1a-9abf-3d9d9544789c"
                resource:
                  $ref: "#/components/schemas/DecoderResourceCreate"
            examples:
              create_decoder:
                summary: Example decoder creation
                value:
                  integration: "9e301671-382d-4c1a-9abf-3d9d9544789c"
                  resource:
                    enabled: true
                    name: "decoder/netflow-default/0"
                    check:
                      - {}
                    normalize: []
                    metadata:
                      title: "NetFlow decoder"
                      description: "Decoder for NetFlow logs."
                      module: "netflow"
                      compatibility: 'This integration has been tested against logs provided by Elastic. - "0.0.1"'
                      author:
                        name: "Wazuh, Inc."
                        email: "info@wazuh.com"
                        url: "https://wazuh.com"
                      references:
                        - "https://www.cisco.com/..."
                      versions:
                        - "All known webhook formats"
      responses:
        "201":
          $ref: "#/components/responses/ResourceCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /decoders/{id}:
    put:
      tags: [Decoders]
      summary: Update Decoder
      description: |
        Updates an existing decoder in the draft space. The decoder is validated against the Wazuh engine before being stored.
        The decoder ID in the path must match the resource ID in the payload (if provided).
      operationId: updateDecoder
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - resource
              properties:
                resource:
                  $ref: "#/components/schemas/DecoderResource"
            examples:
              update_decoder:
                summary: Example decoder update
                value:
                  resource:
                    enabled: true
                    name: "decoder/netflow-default/0"
                    check:
                      - {}
                    normalize: []
                    metadata:
                      title: "NetFlow decoder (Updated)"
                      description: "Updated decoder description."
                      module: "netflow"
                      compatibility: 'This integration has been tested against logs provided by Elastic. - "0.0.1"'
                      author:
                        name: "Wazuh, Inc."
                        email: "info@wazuh.com"
                        url: "https://wazuh.com"
                      references:
                        - "https://www.cisco.com/c/en/us/products/ios-nx-os-software/ios-netflow/index.html"
                      versions:
                        - "All known webhook formats"
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Decoders]
      summary: Delete Decoder
      description: |
        Deletes a decoder from the draft space. The decoder is also removed from any integrations that reference it.
        A decoder cannot be deleted if it is currently set as the root decoder in the draft policy.
      operationId: deleteDecoder
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/ResourceDeleted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Filter management endpoints
  /filters:
    post:
      tags: [Filters]
      summary: Create Filter
      description: |
        Creates a filter in the draft or standard space. The server generates the UUID.
        The filter is validated against the Wazuh engine before being stored.
        The filter is automatically linked to the specified space's policy.
      operationId: createFilter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - space
                - resource
              properties:
                space:
                  type: string
                  enum: [draft, standard]
                  description: Target space for the filter
                resource:
                  $ref: "#/components/schemas/FilterResourceCreate"
            examples:
              create_filter:
                summary: Example filter creation
                value:
                  space: "draft"
                  resource:
                    name: "filter/prefilter/0"
                    enabled: true
                    metadata:
                      description: "Default filter to allow all events (for default ruleset)"
                      author:
                        email: "info@wazuh.com"
                        name: "Wazuh, Inc."
                        url: "https://wazuh.com"
                    check: "$host.os.platform == 'ubuntu'"
                    type: "pre-filter"
      responses:
        "201":
          $ref: "#/components/responses/ResourceCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /filters/{id}:
    put:
      tags: [Filters]
      summary: Update Filter
      description: |
        Updates an existing filter in the draft or standard space. The filter is validated against the Wazuh engine before being stored.
        The filter ID in the path must match the resource ID in the payload (if provided).
      operationId: updateFilter
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - space
                - resource
              properties:
                space:
                  type: string
                  enum: [draft, standard]
                  description: Target space for the filter
                resource:
                  $ref: "#/components/schemas/FilterResource"
            examples:
              update_filter:
                summary: Example filter update
                value:
                  space: "draft"
                  resource:
                    name: "filter/prefilter/0"
                    enabled: true
                    metadata:
                      description: "Updated filter description"
                      author:
                        email: "info@wazuh.com"
                        name: "Wazuh, Inc."
                        url: "https://wazuh.com"
                    check: "$host.os.platform == 'ubuntu'"
                    type: "pre-filter"
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Filters]
      summary: Delete Filter
      description: |
        Deletes a filter from the draft or standard space. The filter is also removed from the associated policy.
      operationId: deleteFilter
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/ResourceDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Rule management endpoints
  /rules:
    post:
      tags: [Rules]
      summary: Create Rule
      description: |
        Creates a rule in the draft space. The server generates the UUID.

        The rule is also synchronized to the Security Analytics Plugin (SAP), where a separate
        SAP document is created with its own auto-generated UUID. The SAP document stores the
        CTI document UUID in a `document.id` field and the space in a `source` field for
        cross-reference.
        The rule is validated against the Wazuh engine before being stored.
        The rule is automatically linked to the specified integration.

        **Validation Note:** The `logsource.product` field in the rule payload MUST exactly match the `metadata.title` of the parent integration specified by the `integration` ID.
      operationId: createRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - integration
                - resource
              properties:
                integration:
                  type: string
                  format: uuid
                  description: The integration resource ID

                resource:
                  $ref: "#/components/schemas/RuleResourceCreate"
            examples:
              create_rule:
                summary: Example rule creation
                value:
                  integration: "9e301671-382d-4c1a-9abf-3d9d9544789c"
                  resource:
                    title: "Test Hash Generation Rule"
                    description: "A rule to verify that SHA-256 hashes are calculated correctly upon creation."
                    author: "Tester"
                    sigma_id: "test_sigma_001"
                    enabled: true
                    status: "experimental"
                    level: "low"
                    references:
                      - "https://wazuh.com"
                    logsource:
                      product: "system"
                      category: "system"
                    detection:
                      condition: "selection"
                      selection:
                        event.action:
                          - "hash_test_event"
      responses:
        "201":
          $ref: "#/components/responses/ResourceCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /rules/{id}:
    put:
      tags: [Rules]
      summary: Update Rule
      description: |
        Updates an existing rule in the draft space and returns its identifier.
        The rule is validated against the Wazuh engine before being stored.
      operationId: updateRule
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - resource
              properties:
                resource:
                  $ref: "#/components/schemas/RuleResource"
            examples:
              update_rule:
                summary: Example rule update
                value:
                  resource:
                    title: "Test Hash Generation Rule (Updated)"
                    description: "Updated rule description for better clarity."
                    author: "Tester"
                    sigma_id: "test_sigma_001"
                    enabled: false
                    status: "stable"
                    level: "medium"
                    references:
                      - "https://wazuh.com"
                    logsource:
                      product: "system"
                      category: "system"
                    detection:
                      condition: "selection"
                      selection:
                        event.action:
                          - "hash_test_event"
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Rules]
      summary: Delete Rule
      description: |
        Deletes a rule from the draft space. The rule is also removed from any integrations that reference it.
      operationId: deleteRule
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/ResourceDeleted"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Integration metadata management endpoints
  /integrations:
    post:
      tags: [Integrations]
      summary: Create Integration
      description: |
        Creates a new integration in the draft space. The indexer generates the UUID for the integration.

        The integration is also synchronized to the Security Analytics Plugin (SAP), where a
        separate SAP document is created with its own auto-generated UUID. The SAP document
        stores the CTI document UUID in a `document.id` field and the space in the `source`
        field (e.g., "Draft") for cross-reference.
        The integration is validated against the Wazuh engine before being stored.

        **Required fields in resource:**
        - `author` - Integration author name
        - `category` - Integration category
        - `title` - Integration title

        **Note:** The `id` field must NOT be included in the request body; it is auto-generated by the indexer.
      operationId: createIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - resource
              properties:
                resource:
                  $ref: "#/components/schemas/IntegrationResourceCreate"
            examples:
              create_integration:
                summary: Example integration creation
                value:
                  resource:
                    title: "azure-functions"
                    author: "Wazuh Inc."
                    category: "cloud-services"
                    description: "This integration supports Azure Functions app logs."
                    documentation: "test1234"
                    enabled: true
                    references:
                      - "https://wazuh.com"
      responses:
        "201":
          $ref: "#/components/responses/ResourceCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /integrations/{id}:
    put:
      tags: [Integrations]
      summary: Update Integration
      description: |
        Updates an existing integration in the draft space. The integration is validated against the Wazuh engine before being stored.
        Only integrations in the 'draft' space can be updated.

        **Required fields in resource:**
        - `author` - Integration author name
        - `category` - Integration category
        - `decoders` - Array of decoder definitions
        - `enabled` - Whether the integration is enabled
        - `kvdbs` - Array of KVDB references
        - `rules` - Array of rule references
        - `title` - Integration title

        **Note:** The `id` field must NOT be included in the request body; the ID is taken from the URL path parameter.
      operationId: updateIntegration
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - resource
              properties:
                resource:
                  $ref: "#/components/schemas/IntegrationResourceUpdate"
            examples:
              update_integration:
                summary: Example integration update
                value:
                  resource:
                    title: "azure-functions (Updated)"
                    author: "Wazuh Inc."
                    category: "cloud-services"
                    description: "Updated description for Azure Functions integration."
                    documentation: "updated documentation"
                    enabled: true
                    references:
                      - "https://wazuh.com"
                      - "https://azure.microsoft.com"
                    rules: []
                    decoders: []
                    kvdbs: []
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Integrations]
      summary: Delete Integration
      description: |
        Deletes an existing integration from the draft space.
        Only integrations in the 'draft' space can be deleted.

        This operation will:
        - Remove the integration from the Security Analytics Plugin
        - Delete the integration from the CTI integrations index
        - Recalculate the space hash for the draft policy

      operationId: deleteIntegration
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/ResourceDeleted"
        "400":
          $ref: "#/components/responses/IntegrationHasDependencies"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Logtest execution endpoint
  /logtest:
    post:
      tags: [Logtest]
      summary: Execute logtest
      operationId: executeLogtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogtestRequest"
      responses:
        "200":
          $ref: "#/components/responses/LogtestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # Promotion endpoints: move content from draft/test into next space
  /promote:
    get:
      tags: [Promotion]
      summary: Preview promotion differences
      description: |
        Calculates the differences between the current space and the next space in the promotion chain.
        Returns a list of operations (add, update, remove) that would be performed during promotion.
      operationId: promotePreview
      parameters:
        - name: space
          in: query
          required: true
          schema:
            type: string
            enum: [draft, test]
      responses:
        "200":
          $ref: "#/components/responses/PromotionPreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Promotion]
      summary: Execute promotion
      description: |
        Executes the promotion of content from the source space to the target space based on the
        provided changes. Engine validation is only performed when promoting to `test`.

        In addition to copying documents across CTI indices, this endpoint synchronizes
        promoted **integrations** and **rules** with the Security Analytics Plugin (SAP).
        For each promoted resource, a new SAP document is created in the target space with:
        - A newly generated UUID as the SAP document ID.
        - A `document.id` field storing the original CTI document UUID.
        - A `source` field indicating the target space (e.g., "Draft", "Test", "Custom").
      operationId: promote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PolicyDiff"
                - $ref: "#/components/schemas/PromotionSpace"

      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /policy/{space}:
    put:
      tags: [Policy]
      summary: Update policy in a given space
      description: |
        Updates the routing policy in the specified space (`draft` or `standard`).

        **Draft space**: All policy fields are accepted. The `integrations` and `filters`
        arrays allow reordering but do not allow adding or removing entries.
        Fields `author`, `description`, `documentation`, and `references` are required
        in addition to the boolean fields.

        **Standard space**: Only `enrichments`, `filters`, `enabled`,
        `index_unclassified_events`, and `index_discarded_events` can be modified.
        All other fields are preserved from the existing standard policy document.
        The `filters` array allows reordering but not addition or removal.
      operationId: policy_update
      parameters:
        - name: space
          in: path
          required: true
          description: Target space for the policy update.
          schema:
            type: string
            enum: [draft, standard]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Policy"
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /space/{space}:
    delete:
      tags: [ Spaces ]
      summary: Reset a user space
      description: |
        Resets a user space (draft) to its initial state.

        This operation will:
        - Remove all documents (integrations, rules, decoders, kvdbs) belonging to the given space.
        - Re-generate the default policy for the given space.

      operationId: deleteSpace
      parameters:
        - name: space
          in: path
          required: true
          description: The name of the user space to reset.
          schema:
            type: string
            enum: [ draft ]
      responses:
        "200":
          $ref: "#/components/responses/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  # Shared path parameters for resource identifiers (UUIDs)
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # --- Data Schemas ---
  schemas:
    SubscriptionPostRequest:
      type: object
      description: Input parameters for registering a CTI subscription.
      properties:
        device_code:
          type: string
          description: The device code for registration.
          example: "GmRhmhcxhwAzkoEqiMEg_DnyEysNkuNhszIySk9eS"
        client_id:
          type: string
          description: The client ID.
          example: "a17c21ed"
        expires_in:
          type: integer
          description: Expiration time in seconds.
          example: 1800
        interval:
          type: integer
          description: Polling interval in seconds.
          example: 5
      required:
        - device_code
        - client_id
        - expires_in
        - interval

    SubscriptionGetResponse:
      type: object
      description: Response schema for retrieving CTI credentials.
      properties:
        access_token:
          type: string
          description: Access token for authentication.
          example: "AYjcyMzY3ZDhiNmJkNTY"
        token_type:
          type: string
          description: Type of the token.
          example: "Bearer"
      required:
        - access_token
        - token_type

    # Request body for logtest execution
    LogtestRequest:
      type: object
      additionalProperties: false
      required:
        - queue
        - location
        - event
      properties:
        queue:
          type: integer
          minimum: 0
          description: Queue number used for logtest execution
          example: 1

        location:
          type: string
          description: Log file path or logical source location
          example: "/var/log/auth.log"

        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata passed to the logtest engine
          example: {}

        space:
          type: string
          enum:
            - standard
            - custom
            - draft
            - test
          description: Space to execute the logtest against
          example: "test"

        event:
          type: string
          description: Raw log event to be tested
          example: "Dec 19 12:00:00 host sshd[123]: Failed password for root from 10.0.0.1 port 12345 ssh2"

        trace_level:
          type: string
          enum:
            - NONE
            - BASIC
            - FULL
          description: Trace verbosity level
          example: "NONE"

    # Response body showing differences during promotion preview
    PolicyDiff:
      type: object
      properties:
        changes:
          type: object
          properties:
            policy:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"
            integrations:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"
            rules:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"
            kvdbs:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"
            decoders:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"
            filters:
              type: array
              items:
                $ref: "#/components/schemas/PromotionDiffItem"

    PromotionDiffItem:
      type: object
      additionalProperties: false
      required:
        - id
        - operation
      properties:
        id:
          type: string
          description: Resource identifier (UUID)
          example: "m98uk4kBlb9cbROIpEj2"
        operation:
          type: string
          description: Operation to be performed (add, update, remove)
          enum: [add, update, remove]
          example: "update"

    # Request body to execute promotion from a given space with full policy
    PromotionSpace:
      type: object
      properties:
        space:
          type: string
          description: The source space to promote from.
          enum: [draft, test]
          example: draft

    # Shared metadata block for non-policy resources (Integration, Decoder, Rule, KVDB, Filter)
    ResourceMetadata:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          description: Human-readable title
        author:
          type: string
          description: Author name
        date:
          type: string
          format: date-time
          description: Creation timestamp (ISO-8601)
        modified:
          type: string
          format: date-time
          description: Last modification timestamp (ISO-8601)
        description:
          type: string
          description: Brief description
        references:
          type: array
          items:
            type: string
          description: Reference URLs
        documentation:
          type: string
          description: Documentation text or URL
        supports:
          type: array
          items:
            type: string
          description: Supported platforms or contexts (defaults to empty)

    # Shared metadata block for Policy resources
    PolicyMetadata:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          description: Human-readable title
        author:
          type: string
          description: Author name
        date:
          type: string
          format: date-time
          description: Creation timestamp (ISO-8601)
        modified:
          type: string
          format: date-time
          description: Last modification timestamp (ISO-8601)
        description:
          type: string
          description: Brief description
        references:
          type: array
          items:
            type: string
          description: Reference URLs
        documentation:
          type: string
          description: Documentation text or URL
        compatibility:
          type: array
          items:
            type: string
          description: Compatibility information (defaults to empty)

    # Request schema for creating an integration (POST)
    IntegrationResourceCreate:
      type: object
      additionalProperties: false
      required:
        - metadata
        - category
      properties:
        metadata:
          allOf:
            - $ref: "#/components/schemas/ResourceMetadata"
            - required:
                - title
                - author

        category:
          type: string
          description: Integration category (e.g., cloud-services)

        enabled:
          type: boolean
          description: Whether the integration is enabled

    # Request schema for updating an integration (PUT)
    IntegrationResourceUpdate:
      type: object
      additionalProperties: false
      required:
        - metadata
        - category
        - enabled
        - rules
        - decoders
        - kvdbs
      properties:
        metadata:
          allOf:
            - $ref: "#/components/schemas/ResourceMetadata"
            - required:
                - title
                - author

        category:
          type: string
          description: Integration category

        enabled:
          type: boolean
          description: Whether the integration is enabled

        # The following arrays are mandatory to allow reordering
        rules:
          type: array
          items:
            type: string
          description: Ordered list of Rule IDs

        decoders:
          type: array
          items:
            type: string
          description: Ordered list of Decoder IDs

        kvdbs:
          type: array
          items:
            type: string
          description: Ordered list of KVDB IDs

    # Decoder document schema for creation (id is auto-generated)
    DecoderResourceCreate:
      type: object
      additionalProperties: false
      # No required fields (None is mandatory)
      properties:
        enabled:
          type: boolean
          description: Whether the decoder is enabled

        name:
          type: string
          description: Decoder name identifier

        check:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Decoder check logic

        normalize:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Normalization rules

        metadata:
          type: object
          additionalProperties: false
          properties:
            author:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                name:
                  type: string
                url:
                  type: string

            compatibility:
              type: string
              description: Compatibility description

            description:
              type: string
              description: Decoder description

            module:
              type: string
              description: Module name

            references:
              type: array
              items:
                type: string
              description: Reference URLs

            title:
              type: string
              description: Human-readable decoder title

            versions:
              type: array
              items:
                type: string
              description: Version numbers

    # Decoder document schema (engine-specific definitions and metadata)
    DecoderResource:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
          description: Whether the decoder is enabled

        name:
          type: string
          description: Decoder name identifier

        check:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Decoder check logic

        normalize:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Normalization rules

        metadata:
          type: object
          additionalProperties: false
          properties:
            author:
              type: object
              additionalProperties: false
              properties:
                name:
                  type: string
                email:
                  type: string
                url:
                  type: string

            compatibility:
              type: string
              description: Compatibility description

            description:
              type: string
              description: Decoder description

            module:
              type: string
              description: Module name

            references:
              type: array
              items:
                type: string
              description: Reference URLs

            title:
              type: string
              description: Human-readable decoder title

            versions:
              type: array
              items:
                type: string
              description: Version numbers

    # Filter document schema for creation (id is auto-generated)
    FilterResourceCreate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Filter name identifier (e.g., filter/prefilter/0)

        enabled:
          type: boolean
          description: Whether the filter is enabled

        check:
          type: string
          description: Filter check expression

        type:
          type: string
          description: Filter type (e.g., pre-filter)

        metadata:
          type: object
          additionalProperties: false
          properties:
            description:
              type: string
              description: Filter description

            author:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                name:
                  type: string
                url:
                  type: string

    # Filter document schema (for updates)
    FilterResource:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: Filter name identifier (e.g., filter/prefilter/0)

        enabled:
          type: boolean
          description: Whether the filter is enabled

        check:
          type: string
          description: Filter check expression

        type:
          type: string
          description: Filter type (e.g., pre-filter)

        metadata:
          type: object
          additionalProperties: false
          properties:
            description:
              type: string
              description: Filter description

            author:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                name:
                  type: string
                url:
                  type: string

    # KVDB document schema (key-value data managed by the engine)
    KvdbResource:
      type: object
      additionalProperties: false
      required:
        - integration
        - resource
      properties:
        integration:
          type: string
          format: uuid
          description: The integration resource ID

        resource:
          type: object
          additionalProperties: false
          required:
            - metadata
            - content
          properties:
            metadata:
              allOf:
                - $ref: "#/components/schemas/ResourceMetadata"
                - required:
                    - title
                    - author

            enabled:
              type: boolean

            content:
              type: object
              additionalProperties: true
              minProperties: 1
              description: KVDB key-value content (engine-managed)

    KvdbResourceUpdate:
      type: object
      additionalProperties: false
      required:
        - resource
      properties:
        resource:
          type: object
          additionalProperties: false
          required:
            - metadata
            - content
          properties:
            metadata:
              allOf:
                - $ref: "#/components/schemas/ResourceMetadata"
                - required:
                    - title
                    - author
                    - description
                    - documentation
                    - references

            enabled:
              type: boolean

            content:
              type: object
              additionalProperties: true
              minProperties: 1
              description: KVDB key-value content (engine-managed)

    # Rule document schema (Sigma-like)
    RuleResourceCreate:
      type: object
      additionalProperties: false
      required:
        - metadata
      properties:
        metadata:
          allOf:
            - $ref: "#/components/schemas/ResourceMetadata"
            - required:
                - title

        sigma_id:
          type: string
          description: Sigma rule ID

        enabled:
          type: boolean
          description: Whether the rule is enabled

        status:
          type: string
          description: Rule status (e.g., experimental, stable)

        level:
          type: string
          description: Alert level (e.g., low, medium, high)

        logsource:
          type: object
          additionalProperties: false
          properties:
            product:
              type: string
              description: Must exactly match the metadata.title of the associated integration.
            category:
              type: string

        detection:
          type: object
          additionalProperties: true
          required:
            - condition
          properties:
            condition:
              type: string
              description: Detection condition logic
          description: Sigma detection logic (contains condition and selection fields)

    RuleResource:
      type: object
      additionalProperties: false
      required:
        - metadata
        - detection
        - logsource
      properties:
        metadata:
          allOf:
            - $ref: "#/components/schemas/ResourceMetadata"
            - required:
                - title

        sigma_id:
          type: string
          description: Sigma rule ID

        enabled:
          type: boolean
          description: Whether the rule is enabled

        status:
          type: string
          description: Rule status (e.g., experimental, stable)

        level:
          type: string
          description: Alert level (e.g., low, medium, high)

        logsource:
          type: object
          additionalProperties: false
          properties:
            product:
              type: string
              description: Must exactly match the metadata.title of the associated integration.
            category:
              type: string

        detection:
          type: object
          additionalProperties: true
          required:
            - condition
          properties:
            condition:
              type: string
              description: Detection condition logic
          description: Sigma detection logic

    # Policy Resource — wrapped inside { "resource": { ... } }
    Policy:
      type: object
      additionalProperties: false
      required:
        - resource
      properties:
        resource:
          $ref: "#/components/schemas/PolicyResource"

    PolicyResource:
      type: object
      additionalProperties: false
      required:
        - enabled
        - index_unclassified_events
        - index_discarded_events
      description: |
        Policy resource definition. The fields `enabled`, `index_unclassified_events`,
        and `index_discarded_events` are always required. When updating the **draft**
        space, `metadata.author`, `metadata.description`, `metadata.documentation`,
        and `metadata.references` are also required.
      properties:
        metadata:
          $ref: "#/components/schemas/PolicyMetadata"

        root_decoder:
          type: string
          description: Identifier of the root decoder for event processing
          example: "decoder/core/0"

        integrations:
          type: array
          items:
            type: string
          description: >
            List of integration IDs. Reordering is allowed, but adding or
            removing entries is not (managed via integration CUD endpoints).
          example: ["integration/wazuh-core/0"]

        filters:
          type: array
          items:
            type: string
          description: >
            List of filter UUIDs. Reordering is allowed, but adding or
            removing entries is not (managed via filter CUD endpoints).
          example: ["5c1df6b6-1458-4b2e-9001-96f67a8b12c8"]

        enrichments:
          type: array
          items:
            type: string
            enum: [connection, hash_md5, hash_sha1, hash_sha256, url-domain, url-full]
          description: >
            Enrichment types to apply. Known values: connection, hash_md5, hash_sha1, hash_sha256, url-domain, url-full.
            No duplicates allowed. May vary based on engine capabilities.
          example: ["connection", "hash_md5", "url-full"]

        enabled:
          type: boolean
          description: Whether the policy is active and synchronized by the Engine
          example: true

        index_unclassified_events:
          type: boolean
          description: Whether uncategorized events are indexed
          example: false

        index_discarded_events:
          type: boolean
          description: Whether discarded events are indexed
          example: false

    RestResponse:
      type: object
      description: Standard response schema.
      properties:
        message:
          type: string
        status:
          type: integer
      required:
        - message
        - status

  # --- Responses schemas ---
  responses:
    # --- Success Responses ---
    SubscriptionCreated:
      description: Created - Subscription registered successfully.

    GetCredentialsSuccess:
      description: OK - Credentials retrieved successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SubscriptionGetResponse"
          examples:
            credentials:
              summary: Valid credentials response
              value:
                access_token: "AYjcyMzY3ZDhiNmJkNTY"
                token_type: "Bearer"

    SubscriptionDeleted:
      description: OK - Subscription deleted successfully.

    UpdateAccepted:
      description: Accepted - The update request has been accepted for processing.
      headers:
        X-RateLimit-Limit:
          description: The maximum number of requests allowed per hour.
          schema:
            type: integer
            example: 10
        X-RateLimit-Remaining:
          description: The number of requests remaining in the current window.
          schema:
            type: integer
            example: 7
        X-RateLimit-Reset:
          description: The time at which the current rate limit window resets (Unix timestamp).
          schema:
            type: integer
            example: 1699963200

    OkResponse:
      description: |
        OK - The request was successful.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            success:
              summary: Generic success response
              value:
                message: "0d40f751-efa5-4b6f-822d-5f82e7532f1e"
                status: 200

    ResourceCreated:
      description: |
        OK - The resource was created successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            success:
              summary: Generic success response
              value:
                message: "0d40f751-efa5-4b6f-822d-5f82e7532f1e"
                status: 201

    # --- Error Responses ---
    BadRequest:
      description: |
        Bad Request - The request could not be processed due to invalid input.

        Common causes:
        - Missing required fields in the request body
        - Invalid field format (e.g., invalid UUID)
        - Invalid resource type
        - Engine validation failed (payload does not pass Wazuh Engine validation)
        - Resource not in draft space (only draft resources can be modified)
        - Resource has dependent resources that must be deleted first
        - Cannot remove decoder as it is set as root decoder
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            missing_field:
              summary: Missing required field
              value:
                message: "Missing [<field_name>] field."
                status: 400
            invalid_body:
              summary: Invalid request body
              value:
                message: "Invalid request body"
                status: 400
            invalid_uuid:
              summary: Invalid UUID format
              value:
                message: "'invalid-id' is not a valid UUID"
                status: 400
            not_in_draft:
              summary: Resource not in draft space
              value:
                message: "Integration [9e301671-382d-4c1a-9abf-3d9d9544789c] is not in draft space"
                status: 400
            root_decoder:
              summary: Decoder is set as root
              value:
                message: "Cannot remove decoder [82e215c4-988a-4f64-8d15-b98b2fc03a4f] as it is set as root decoder."
                status: 400

    Unauthorized:
      description: Unauthorized - Authentication failed or credentials are invalid.

    ResourceDeleted:
      description: OK - Resource deleted successfully.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            resource_deleted:
              summary: Resource deletion confirmation
              value:
                message: "m98uk4kBlb9cbROIpEj2"
                status: 200

    IntegrationHasDependencies:
      description: OK - Integration has dependent resources.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            has_dependencies:
              summary: Integration has dependent resources
              value:
                message: "Cannot delete integration because it has decoders attached"
                status: 400

    NotFound:
      description: Not Found - The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            resource_not_found:
              summary: Resource not found
              value:
                message: "Resource not found."
                status: 404

    Conflict:
      description: Conflict - Undergoing content update.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            undergoing_update:
              summary: Content update in progress
              value:
                error: "A content update is already in progress."

    TooManyRequests:
      description: Too Many Requests - Rate limit exceeded.
      headers:
        X-RateLimit-Limit:
          description: The maximum number of requests allowed per hour.
          schema:
            type: integer
            example: 10
        X-RateLimit-Remaining:
          description: The number of requests remaining (will be 0).
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: The time at which the current rate limit window resets (Unix timestamp).
          schema:
            type: integer
            example: 1699963200
        Retry-After:
          description: Number of seconds to wait before retrying.
          schema:
            type: integer
            example: 3600
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            rate_limit_exceeded:
              summary: Rate limit exceeded
              value:
                error: "Too many update requests. Please try again later."

    InternalServerError:
      description: |
        Internal Server Error - The server encountered an unexpected error.

        Common causes:
        - Engine service is unavailable
        - Security Analytics service is unavailable
        - Indexer operation failed
        - Unexpected exception during processing
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RestResponse"
          examples:
            internal_error:
              summary: Internal server error
              value:
                message: "Internal Server Error"
                status: 500

    # Response body for logtest execution results (pass-through)
    LogtestResponse:
      description: Logtest result
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                example: "OK"
              result:
                type: object
                properties:
                  output:
                    type: string
                    example: '{"wazuh":{"protocol":{"queue":1,"location":"syscheck"},"integration":{"category":"Security","name":"integration/wazuh-core/0","decoders":["core-wazuh-message","integrations"]}},"name":"nahuel","event":{"original":"File /etc/passwd modified"},"@timestamp":"2025-12-26T17:33:22Z"}'
                  asset_traces:
                    type: array
                    items:
                      type: object
                      properties:
                        asset:
                          type: string
                          example: "decoder/core-wazuh-message/0"
                        success:
                          type: boolean
                          example: true
                        traces:
                          type: array
                          items:
                            type: string
                          example: ["@timestamp: get_date -> Success"]

    PromotionPreviewResponse:
      description: Promotion preview result
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PolicyDiff"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token authentication using JWT (JSON Web Token).
        Include the token in the Authorization header as: `Authorization: Bearer <token>`

        Tokens can be obtained through the Wazuh authentication system.
    basicAuth:
      type: http
      scheme: basic
      description: |
        **Secure Basic Authentication**.
        Clients must provide username and password encoded in Base64.
