# Prometheus scrape config for the perf monitor VM (Tracks B/C).
# Scrapes node_exporter on the indexer host every 10s so the indexer's cold start
# and the full load window are captured at sub-minute resolution.
#
# ${INDEXER_HOST} is substituted by setup-monitor.sh before Prometheus starts.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: node_exporter
    static_configs:
      - targets: ["${INDEXER_HOST}:9100"]
        labels:
          host: indexer
  # JMX exporter (javaagent) on the indexer JVM — deep JVM metrics (heap pools, GC, threads).
  - job_name: jmx_exporter
    static_configs:
      - targets: ["${INDEXER_HOST}:9404"]
        labels:
          host: indexer
