# Prometheus + Grafana for the perf monitor VM (Tracks B/C).
# Runs OFF the indexer host so the observer does not consume the resources under
# measurement. setup-monitor.sh renders prometheus.yml (indexer host) before up.
#
#   docker compose -f compose.yml up -d
#
# Prometheus UI :9090 — Grafana :3000 (admin / admin), Prometheus datasource +
# "Wazuh Indexer Host Overview" dashboard auto-provisioned (uid wazuh-host-overview).

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: perf-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./prometheus.rendered.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: perf-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./grafana/dashboard-provider.yml:/etc/grafana/provisioning/dashboards/perf.yml:ro
      - ./grafana/host-overview.json:/etc/grafana/dashboards/host-overview.json:ro
      - ./grafana/jvm-overview.json:/etc/grafana/dashboards/jvm-overview.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
