# Reference OpenTelemetry Collector config for Wazuh Indexer performance runs.
#
# The metrics sampler (tools/performance/metrics/sampler.py) exports OTLP when
# OTEL_EXPORTER_OTLP_ENDPOINT points at this collector. The backend (TSDB,
# dashboards, alerting) is intentionally NOT defined here — wire the exporter
# below to whatever observability stack you run.
#
# Run: otelcol --config tools/performance/otel/otel-collector-config.yml

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
  # Tag every sample so runs are distinguishable in your backend.
  resource:
    attributes:
      - key: service.name
        value: wazuh-indexer
        action: upsert

exporters:
  # Default sink: log to stdout so the pipeline works out of the box.
  # Replace / add your own exporter (e.g. otlphttp to your backend).
  debug:
    verbosity: detailed
  # Example passthrough to an upstream OTLP backend (uncomment + set endpoint):
  # otlphttp:
  #   endpoint: https://your-backend.example:4318

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug]
