name: (5.x) Build Wazuh Common Schema

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "wcs/**/*.json"
      - "wcs/**/*.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wcs:
    name: Build Wazuh Common Schema
    if: github.repository == 'wazuh/wazuh-indexer-plugins'
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker Compose
        run: sudo apt-get install docker-compose

      - name: Update module list
        run: bash wcs/generator/update_module_list.sh

      - name: Generate WCS
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: bash wcs/generator/generate_schema.sh

      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.INDEXER_BOT_TOKEN }}
          COMMITER_EMAIL: ${{ secrets.INDEXER_BOT_EMAIL }}
          COMMITTER_USERNAME: "Wazuh Indexer Bot"
          SSH_PRIVATE_KEY: ${{ secrets.INDEXER_BOT_PRIVATE_SSH_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.INDEXER_BOT_PUBLIC_SSH_KEY }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: bash wcs/generator/push_schema.sh

      - name: Display pull request link
        if: ${{ success() }}
        run: echo "::notice::Pull request link => $(cat /tmp/pull_request_link.txt)"

      - name: Open PR to Security Analytics Plugin if finding-enrichment mapping changed
        env:
          GITHUB_TOKEN: ${{ secrets.INDEXER_BOT_TOKEN }}
          COMMITER_EMAIL: ${{ secrets.INDEXER_BOT_EMAIL }}
          COMMITTER_USERNAME: "Wazuh Indexer Bot"
          SSH_PRIVATE_KEY: ${{ secrets.INDEXER_BOT_PRIVATE_SSH_KEY }}
          SSH_PUBLIC_KEY: ${{ secrets.INDEXER_BOT_PUBLIC_SSH_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          SAP_REPO="wazuh/wazuh-indexer-security-analytics"
          SAP_MAPPING_PATH="src/main/resources/mappings/wazuh-finding-enrichment-mapping.json"
          MAPPING_FILE="${{ github.workspace }}/plugins/setup/src/main/resources/wazuh-finding-enrichment-mapping.json"

          if [[ ! -f "$MAPPING_FILE" ]]; then
            echo "Finding-enrichment mapping was not generated. Skipping."
            exit 0
          fi

          # Clone the SAP repository
          SAP_DIR=$(mktemp -d)
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${SAP_REPO}.git" "$SAP_DIR"

          # Compare with existing mapping in SAP
          if diff -q "$MAPPING_FILE" "$SAP_DIR/$SAP_MAPPING_PATH" > /dev/null 2>&1; then
            echo "Finding-enrichment mapping is unchanged. No PR needed."
            rm -rf "$SAP_DIR"
            exit 0
          fi

          echo "Finding-enrichment mapping has changed. Opening PR to ${SAP_REPO}..."

          # Configure git identity
          cd "$SAP_DIR"
          git config user.email "${COMMITER_EMAIL}"
          git config user.name "${COMMITTER_USERNAME}"

          # Set up commit signing
          mkdir -p ~/.ssh/
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519_bot
          echo "${SSH_PUBLIC_KEY}" > ~/.ssh/id_ed25519_bot.pub
          chmod 600 ~/.ssh/id_ed25519_bot
          chmod 644 ~/.ssh/id_ed25519_bot.pub
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_ed25519_bot
          git config gpg.format ssh
          git config commit.gpgsign true
          git config user.signingkey ~/.ssh/id_ed25519_bot.pub

          # Create branch and commit
          BRANCH_NAME="automated/update-finding-enrichment-mapping"
          git checkout -B "$BRANCH_NAME"
          cp "$MAPPING_FILE" "$SAP_MAPPING_PATH"
          git add "$SAP_MAPPING_PATH"
          
          git commit -m "Update wazuh-finding-enrichment-mapping.json" \
            -m "Automated update from wazuh-indexer-plugins." \
            -m "Source PR: ${SOURCE_PR_URL}"
          git push origin "$BRANCH_NAME"

          # Create or update PR using GitHub CLI
          echo "${GITHUB_TOKEN}" | gh auth login --with-token
          EXISTING_PR=$(gh pr list --repo "$SAP_REPO" --head "$BRANCH_NAME" --json number --jq '.[].number')
          
          if [[ -z "$EXISTING_PR" ]]; then
            SAP_PR_LINK=$(gh pr create \
              --repo "$SAP_REPO" \
              --title "$PR_TITLE" \
              --body "Automated update of the finding-enrichment mapping from [wazuh-indexer-plugins](${SOURCE_PR_URL})." \
              --head "$BRANCH_NAME" \
              --base main)
            echo "::notice::SAP PR created: ${SAP_PR_LINK}"
          else
            SAP_PR_LINK=$(gh pr view "$EXISTING_PR" --repo "$SAP_REPO" --json url --jq '.url')
            echo "::notice::SAP PR already exists: ${SAP_PR_LINK}"
          fi

          rm -rf "$SAP_DIR"
          
      - name: Convert static mappings to dynamic_templates
        run: |
          echo "Converting generated static mappings to dynamic_templates..."
          
          find plugins/setup/src/main/resources/templates/streams/ -name "events.json" -type f -exec python3 wcs/generator/convert_to_dynamic_templates.py {} {} \;